<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1d1d1e" />
    <meta
      name="description"
      content="ГУСТОЙ — меню, карта лояльности, G-бонусы, отзывы и Telegram-группа постоянников."
    />
    <title>ГУСТОЙ</title>
    <link rel="preload" as="image" type="image/svg+xml" href="assets/gustoy-home-2026.svg?v=reviews-1" />
    <link rel="stylesheet" href="styles.css?v=mobile-2" />
  </head>
  <body>
    <main class="landing" aria-labelledby="page-title">
      <h1 class="visually-hidden" id="page-title">ГУСТОЙ — место хороших ребят</h1>
      <img
        class="design"
        src="assets/gustoy-home-2026.svg?v=reviews-1"
        width="11377"
        height="32808"
        alt="ГУСТОЙ — меню, карта лояльности и задания с G-бонусами"
        decoding="async"
      />

      <nav class="hotspots" aria-label="Основные действия">
        <button
          class="hotspot hotspot--menu"
          id="menu-open"
          type="button"
          aria-haspopup="dialog"
          aria-label="Открыть меню"
        ></button>

        <a
          class="hotspot hotspot--loyalty"
          href="https://xvkq3042.uds.app/c/join?ref=xvkq3042"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Зарегистрировать карту лояльности UDS"
        ></a>

        <a
          class="hotspot hotspot--2gis"
          href="https://2gis.ru/reviews/70000001027295493/addReview?utm_source=lk"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Оставить отзыв в 2ГИС"
        ></a>

        <a
          class="hotspot hotspot--yandex"
          href="https://yandex.ru/profile/165048607455?intent=reviews"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Оставить отзыв на Яндексе"
        ></a>

        <a
          class="hotspot hotspot--telegram"
          href="https://t.me/+7MPlepUNmtYxYmI6"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Открыть Telegram-группу постоянников"
        ></a>

        <a
          class="hotspot hotspot--survey"
          href="https://docs.google.com/forms/d/e/1FAIpQLSeiTU3ouHFEyhRMCRh_cpVpD_Dn5laaLdtFzP8Nx8uni8c1Rw/viewform?pli=1"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Заполнить анкету"
        ></a>
      </nav>
    </main>

    <dialog class="menu-dialog" id="menu-dialog" aria-labelledby="menu-title">
      <div class="menu-toolbar">
        <h2 id="menu-title">МЕНЮ</h2>
        <div class="menu-toolbar__actions">
          <a
            class="menu-pdf-link"
            href="assets/menu/gustoy-menu.pdf"
            target="_blank"
            rel="noopener noreferrer"
          >PDF</a>
          <button class="menu-close" id="menu-close" type="button" aria-label="Закрыть меню">×</button>
        </div>
      </div>

      <div class="menu-pages">
        <img src="assets/menu/page-1.png" alt="Меню ГУСТОЙ, страница 1" />
        <img loading="lazy" src="assets/menu/page-2.png" alt="Меню ГУСТОЙ, страница 2" />
        <img loading="lazy" src="assets/menu/page-3.png" alt="Меню ГУСТОЙ, страница 3" />
        <img loading="lazy" src="assets/menu/page-4.png" alt="Меню ГУСТОЙ, страница 4" />
        <img loading="lazy" src="assets/menu/page-5.png" alt="Меню ГУСТОЙ, страница 5" />
      </div>
    </dialog>

    <noscript>
      <p class="noscript-menu">
        <a href="assets/menu/gustoy-menu.pdf">Открыть меню в PDF</a>
      </p>
    </noscript>

    <script src="script.js?v=mobile-1"></script>
  </body>
</html>
